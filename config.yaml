          gpu_memory_utilization: 0.95
          max_model_len: 65536
          max_num_seqs: 8
          max_num_batched_tokens: 131072
          mm_processor_cache_gb: 8
          generation_config: vllm
          limit_mm_per_prompt:
            image: 128
            video: 0
