# Evaluation settings
EVAL:
  num_workers: 4
  save_interval: 5
  timeout: 120
  max_retries: 3

# Data paths
PATHS:
  annotation_dir: "../annotation"
  video_base_dir: "../../Datasets/_selected_data"
  results_dir: "./results"

# Video source mapping
VIDEO_SOURCES:
  Sekai: "Sekai"
  Ego4D: "Ego4D"
  RoomTour3D: "RoomTour3D"
  CODa_full: "CODa_full"
  OmniWorld: "OmniWorld"

# Task definitions
TASKS:
  level_1:
    - "1.1.1"  # Absolute Distance
    - "1.1.2"  # Relative Physical Scale
    - "1.1.3"  # Passability Affordance
    - "1.1.4"  # Viewpoint Height Perception
    - "1.1.5"  # Containment Judgment
    - "1.2.1"  # Directional Enumeration
    - "1.2.2"  # Occlusion Recognition
    - "1.2.3"  # Support Relation
    - "1.2.4"  # Containment Relation
    - "1.2.5"  # Local Topology Description
    - "1.3.1"  # Ego-motion Translation
    - "1.3.2"  # Ego-motion Rotation
    - "1.3.3"  # Object Motion Separation
  level_2:
    - "2.1.1"  # Scene Recognition
    - "2.1.2"  # Re-visit Detection
    - "2.2.1"  # Out-of-view Localization
    - "2.2.2"  # State Memory
    - "2.3.1"  # Temporal Reasoning
    - "2.3.2"  # Trajectory Backtracing
