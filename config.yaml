          temperature: 0.0
          enable_thinking: true
          extra_body:
            chat_template_kwargs:
              enable_thinking: true
          api_workers: 32
          batch_size: 1
          vllm_server:
            dtype: bfloat16
            gpu_memory_utilization: 0.95
            max_model_len: 65536
            max_num_seqs: 32
            max_num_batched_tokens: 131072
            mm_processor_cache_gb: 8
            generation_config: vllm
            limit_mm_per_prompt:
